<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinVid — Video Downloader</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23e74c3c'/><polygon points='40,30 40,70 72,50' fill='white'/></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e60023" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="4" />
          <path d="M12 8v8" />
          <path d="M8 12h8" />
        </svg>
        <h1>PinVid</h1>
        <span class="badge">v2</span>
      </div>
      <p class="subtitle">Paste a Pinterest or YouTube link to download the video</p>

      <div class="source-tabs">
        <button class="source-tab active" data-source="all">All</button>
        <button class="source-tab" data-source="pinterest">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12c0 5.1 3.2 9.4 7.6 11.2-.1-.9-.2-2.4 0-3.4.2-.9 1.4-5.9 1.4-5.9s-.4-.7-.4-1.8c0-1.7 1-3 2.2-3 .9 0 1.4.7 1.4 1.6 0 1-.6 2.4-1 3.7-.3 1.1.6 2 1.6 2 1.9 0 3.4-2 3.4-5 0-2.6-1.9-4.4-4.6-4.4-3.1 0-5 2.3-5 5.4 0 1 .4 2 .8 2.6v.3c-.1.4-.3 1.2-.3 1.4-.1.2-.2.2-.4.1-1.5-.7-2.4-2.9-2.4-4.6 0-3.8 2.8-7.3 7.9-7.3 4.2 0 7.4 3 7.4 6.9 0 4.1-2.6 7.5-6.2 7.5-1.2 0-2.4-.6-2.7-1.4l-.8 2.9c-.3 1.1-1.1 2.5-1.6 3.3C8.6 23 10.3 24 12 24c6.6 0 12-5.4 12-12S18.6 0 12 0"/></svg>
          Pinterest
        </button>
        <button class="source-tab" data-source="youtube">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2c-.3-1-1.1-1.8-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6c-1 .2-1.8 1-2.1 2C0 8 0 12 0 12s0 4 .5 5.8c.3 1 1.1 1.8 2.1 2.1 1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6c1-.2 1.8-1 2.1-2C24 16 24 12 24 12s0-4-.5-5.8zM9.5 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          YouTube
        </button>
      </div>

      <div class="input-group">
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
          </svg>
          <input type="url" id="urlInput" placeholder="https://pin.it/... or https://youtube.com/..." autocomplete="off" spellcheck="false" />
          <button id="pasteBtn" class="paste-btn" title="Paste from clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="8" y="2" width="8" height="4" rx="1" />
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            </svg>
          </button>
        </div>

        <div id="qualityRow" class="quality-row hidden">
          <span class="quality-label">Quality</span>
          <div class="quality-options">
            <button class="quality-btn active" data-quality="1080p">1080p</button>
            <button class="quality-btn" data-quality="2160p">4K</button>
          </div>
        </div>

        <button id="downloadBtn" class="download-btn">
          <span class="btn-text">Download</span>
          <span class="btn-spinner"></span>
        </button>
      </div>

      <div id="errorMsg" class="error-msg" role="alert"></div>

      <div id="result" class="result hidden">
        <div class="video-meta" id="videoMeta">
          <span class="meta-source" id="metaSource"></span>
          <span class="meta-quality" id="metaQuality"></span>
          <span class="meta-resolution" id="metaResolution"></span>
        </div>
        <div class="video-wrapper">
          <video id="videoPreview" controls playsinline></video>
        </div>
        <div class="result-footer">
          <span id="videoTitle" class="video-title"></span>
          <div class="result-actions">
            <a id="saveBtn" class="save-btn" download>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Save Video
            </a>
            <a id="saveAudioBtn" class="save-btn save-audio-btn hidden" download>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              Audio Only
            </a>
          </div>
        </div>
      </div>

      <div id="placeholder" class="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon">
          <rect x="2" y="2" width="20" height="20" rx="4" />
          <path d="M12 8v8" />
          <path d="M8 12h8" />
        </svg>
        <p>Paste a Pinterest or YouTube URL<br />and hit Download</p>
      </div>
    </div>

    <p class="footer-text">PinVid does not store any videos. All processing happens in real-time.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
